{% extends 'base.html' %}

{% block main %}
<h1 class="page-header">Uploaded Images</h1>

{% include 'flash_messages.html' %}

<div class="image-grid">
    {% for image in images %}
        <div class="image-item">
            <img src="{{ url_for('get_image', filename=image) }}" alt="{{ image }}">
        </div>
    {% endfor %}
</div>

{% endblock %}

{% block styles %}
<style>

.image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    grid-gap: 15px;
    margin-top: 20px;
}

.image-item {
    border: 1px solid #ddd;
    padding: 5px;
    border-radius: 8px;
    background-color: #f9f9f9;
    text-align: center;
}


.image-item img {
    max-width: 100%;
    height: auto;
    border-radius: 5px;
    object-fit: cover;
}
</style>
{% endblock %}
